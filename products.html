<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - LuxeJewels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Luxe<span>Jewels</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Shop</a>
        <a href="products.html?category=rings">Rings</a>
        <a href="products.html?category=necklaces">Necklaces</a>
        <a href="products.html?category=earrings">Earrings</a>
        <a href="products.html?category=bracelets">Bracelets</a>
      </div>
      <div class="nav-icons">
        <a href="account.html" class="nav-icon" id="account-link" style="display:none;">&#9733;</a>
        <a href="cart.html" class="nav-icon">
          &#9829;
          <span class="cart-count">0</span>
        </a>
        <a href="login.html" class="nav-icon" id="auth-link">Login</a>
        <button class="mobile-menu-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Breadcrumb -->
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <span class="current">Shop</span>
      </div>
    </div>

    <!-- Shop Section -->
    <section class="section" style="padding-top: 0;">
      <div class="container">
        <div style="display: flex; gap: 30px;">

          <!-- Sidebar Filters -->
          <aside style="width: 280px; flex-shrink: 0;" id="filter-sidebar">
            <div style="position: sticky; top: 90px;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 1.2rem;">Filters</h3>
                <button onclick="clearFilters()" class="btn btn-sm btn-outline" style="padding: 5px 12px; font-size: 0.8rem;">Clear All</button>
              </div>

              <!-- Category Filter -->
              <div class="filter-group">
                <h4>Category</h4>
                <div class="filter-checkbox">
                  <input type="checkbox" id="cat-rings" value="rings" onchange="applyFilters()">
                  <label for="cat-rings">Rings</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="cat-necklaces" value="necklaces" onchange="applyFilters()">
                  <label for="cat-necklaces">Necklaces</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="cat-earrings" value="earrings" onchange="applyFilters()">
                  <label for="cat-earrings">Earrings</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="cat-bracelets" value="bracelets" onchange="applyFilters()">
                  <label for="cat-bracelets">Bracelets</label>
                </div>
              </div>

              <!-- Metal Filter -->
              <div class="filter-group">
                <h4>Metal</h4>
                <div class="filter-checkbox">
                  <input type="checkbox" id="metal-gold" value="gold" onchange="applyFilters()">
                  <label for="metal-gold">Gold</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="metal-silver" value="silver" onchange="applyFilters()">
                  <label for="metal-silver">Silver</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="metal-rosegold" value="rosegold" onchange="applyFilters()">
                  <label for="metal-rosegold">Rose Gold</label>
                </div>
              </div>

              <!-- Gemstone Filter -->
              <div class="filter-group">
                <h4>Gemstone</h4>
                <div class="filter-checkbox">
                  <input type="checkbox" id="gem-diamond" value="diamond" onchange="applyFilters()">
                  <label for="gem-diamond">Diamond</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="gem-sapphire" value="sapphire" onchange="applyFilters()">
                  <label for="gem-sapphire">Sapphire</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="gem-emerald" value="emerald" onchange="applyFilters()">
                  <label for="gem-emerald">Emerald</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="gem-pearl" value="pearl" onchange="applyFilters()">
                  <label for="gem-pearl">Pearl</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="gem-amethyst" value="amethyst" onchange="applyFilters()">
                  <label for="gem-amethyst">Amethyst</label>
                </div>
                <div class="filter-checkbox">
                  <input type="checkbox" id="gem-none" value="none" onchange="applyFilters()">
                  <label for="gem-none">No Gemstone</label>
                </div>
              </div>

              <!-- Price Filter -->
              <div class="filter-group">
                <h4>Price Range</h4>
                <div class="price-range">
                  <input type="range" id="price-min" min="0" max="3000" value="0" oninput="applyFilters()" style="width: 100%;">
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-light); margin-top: 8px;">
                  <span>$0</span>
                  <span id="price-max-label">$3000</span>
                </div>
              </div>
            </div>
          </aside>

          <!-- Main Content -->
          <div style="flex: 1;">

            <!-- Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
              <div>
                <h2 id="page-title" style="font-size: 1.5rem;">All Products</h2>
                <p class="text-muted" id="product-count">20 products</p>
              </div>
              <div style="display: flex; gap: 15px; align-items: center;">
                <input type="text" id="search-input" placeholder="Search products..." 
                       class="form-control" style="width: 250px;" oninput="applyFilters()">
                <select id="sort-select" class="form-control" style="width: 180px;" onchange="applyFilters()">
                  <option value="featured">Featured</option>
                  <option value="price-low">Price: Low to High</option>
                  <option value="price-high">Price: High to Low</option>
                  <option value="rating">Highest Rated</option>
                  <option value="newest">Newest</option>
                </select>
              </div>
            </div>

            <!-- Products Grid -->
            <div class="grid grid-3" id="products-grid">
              <!-- Products loaded by JS -->
            </div>

            <!-- Empty State -->
            <div class="empty-state hidden" id="empty-state">
              <div class="empty-state-icon">&#128269;</div>
              <h3>No products found</h3>
              <p>Try adjusting your filters or search terms</p>
              <button onclick="clearFilters()" class="btn btn-primary">Clear Filters</button>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>

</body>
</html>
