<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LuxeJewels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Luxe<span>Jewels</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?category=rings">Rings</a>
        <a href="products.html?category=necklaces">Necklaces</a>
        <a href="products.html?category=earrings">Earrings</a>
        <a href="products.html?category=bracelets">Bracelets</a>
      </div>
      <div class="nav-icons">
        <a href="account.html" class="nav-icon" id="account-link" style="display:none;">&#9733;</a>
        <a href="cart.html" class="nav-icon">
          &#9829;
          <span class="cart-count">0</span>
        </a>
        <a href="login.html" class="nav-icon active" id="auth-link">Login</a>
        <button class="mobile-menu-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Auth Section -->
    <section class="section" style="min-height: calc(100vh - var(--nav-height)); display: flex; align-items: center; background: var(--bg-alt);">
      <div class="container">
        <div style="max-width: 450px; margin: 0 auto;">
          <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 2rem;">Welcome Back</h1>
            <p style="color: var(--text-light);">Sign in to your account</p>
          </div>

          <div style="background: var(--bg); padding: 35px; border-radius: var(--radius-lg); box-shadow: var(--shadow);">
            <div id="login-error" class="alert alert-danger hidden"></div>

            <form id="login-form">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
              </div>

              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                  <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--primary);">
                  <span style="font-size: 0.9rem;">Remember me</span>
                </label>
                <a href="#" style="font-size: 0.9rem; color: var(--primary);">Forgot password?</a>
              </div>

              <button type="submit" class="btn btn-primary btn-block" style="width: 100%; padding: 14px;">
                Sign In
              </button>
            </form>

            <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border);">
              <p style="font-size: 0.9rem; color: var(--text-light);">
                Don't have an account? 
                <a href="register.html" style="color: var(--primary); font-weight: 500;">Create one</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
