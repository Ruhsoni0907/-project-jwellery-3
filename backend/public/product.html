<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - LuxeJewels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Luxe<span>Jewels</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?category=rings">Rings</a>
        <a href="products.html?category=necklaces">Necklaces</a>
        <a href="products.html?category=earrings">Earrings</a>
        <a href="products.html?category=bracelets">Bracelets</a>
      </div>
      <div class="nav-icons">
        <a href="account.html" class="nav-icon" id="account-link" style="display:none;">&#9733;</a>
        <a href="cart.html" class="nav-icon">
          &#9829;
          <span class="cart-count">0</span>
        </a>
        <a href="login.html" class="nav-icon" id="auth-link">Login</a>
        <button class="mobile-menu-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Breadcrumb -->
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="products.html">Shop</a>
        <span>/</span>
        <span class="current" id="breadcrumb-product">Product</span>
      </div>
    </div>

    <!-- Product Detail -->
    <section class="section" style="padding-top: 0;">
      <div class="container">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 50px;" id="product-detail">
          <!-- Product Images -->
          <div>
            <div style="border-radius: var(--radius-lg); overflow: hidden; background: var(--bg-alt); margin-bottom: 15px;">
              <img id="main-image" src="" alt="" style="width: 100%; height: 500px; object-fit: cover;">
            </div>
            <div style="display: flex; gap: 10px;" id="thumbnail-container">
              <!-- Thumbnails loaded by JS -->
            </div>
          </div>

          <!-- Product Info -->
          <div>
            <p class="product-category" id="product-category" style="font-size: 0.9rem;"></p>
            <h1 id="product-name" style="font-size: 2rem; margin: 10px 0;"></h1>
            
            <div class="product-rating" style="margin-bottom: 15px;">
              <span class="stars" id="product-stars"></span>
              <span class="rating-count" id="product-reviews"></span>
            </div>

            <div class="product-price" style="margin-bottom: 20px;">
              <span class="current-price" id="product-price" style="font-size: 1.5rem;"></span>
              <span class="original-price" id="product-original-price"></span>
            </div>

            <p id="product-description" style="color: var(--text-light); line-height: 1.8; margin-bottom: 25px;"></p>

            <!-- Metal Options -->
            <div class="form-group">
              <label>Metal</label>
              <div class="metal-options" id="metal-options">
                <!-- Loaded by JS -->
              </div>
            </div>

            <!-- Size Options -->
            <div class="form-group" id="size-section">
              <label>Size</label>
              <div class="size-options" id="size-options">
                <!-- Loaded by JS -->
              </div>
            </div>

            <!-- Quantity -->
            <div class="form-group">
              <label>Quantity</label>
              <div class="quantity-selector">
                <button class="qty-btn" onclick="updateQuantity(-1)">-</button>
                <input type="number" class="qty-input" id="quantity" value="1" min="1" max="10">
                <button class="qty-btn" onclick="updateQuantity(1)">+</button>
              </div>
            </div>

            <!-- Stock -->
            <p style="margin-bottom: 20px;">
              <span id="stock-status" style="font-size: 0.9rem;"></span>
            </p>

            <!-- Action Buttons -->
            <div style="display: flex; gap: 15px; margin-bottom: 30px;">
              <button class="btn btn-primary btn-lg" style="flex: 1;" onclick="addProductToCart()">
                Add to Cart
              </button>
              <button class="btn btn-outline btn-lg" id="wishlist-btn" onclick="toggleProductWishlist()">
                &#9825;
              </button>
            </div>

            <!-- Features -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; background: var(--bg-alt); border-radius: var(--radius);">
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">&#128274;</span>
                <span style="font-size: 0.9rem;">Secure Payment</span>
              </div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">&#128666;</span>
                <span style="font-size: 0.9rem;">Free Shipping $500+</span>
              </div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">&#128260;</span>
                <span style="font-size: 0.9rem;">30-Day Returns</span>
              </div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">&#9989;</span>
                <span style="font-size: 0.9rem;">Quality Guaranteed</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Related Products -->
    <section class="section" style="background: var(--bg-alt);">
      <div class="container">
        <h2 class="section-title">You May Also Like</h2>
        <p class="section-subtitle">Similar products you might love</p>
        <div class="grid grid-4" id="related-products">
          <!-- Related products loaded by JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/product.js"></script>

</body>
</html>
