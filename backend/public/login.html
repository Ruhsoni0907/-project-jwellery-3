<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LuxeJewels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Luxe<span>Jewels</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
      </div>
      <div class="nav-icons">
        <a href="cart.html" class="nav-icon">&#9829;<span class="cart-count">0</span></a>
        <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <main class="main-content">
    <section class="section" style="min-height:calc(100vh - var(--nav-height));display:flex;align-items:center;background:var(--bg-alt)">
      <div class="container">
        <div style="max-width:450px;margin:0 auto;text-align:center">
          <div style="margin-bottom:30px">
            <h1 style="font-size:2rem">Welcome to LuxeJewels</h1>
            <p style="color:var(--text-light);margin-top:10px">Sign in to access your account, orders, and wishlist</p>
          </div>
          <div style="background:var(--bg);padding:40px;border-radius:var(--radius-lg);box-shadow:var(--shadow)">
            <button onclick="loginWithGoogle()" class="btn btn-primary btn-lg" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;font-size:1rem;background:#4285f4;border-color:#4285f4">
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              Sign in with Google
            </button>
            <p style="margin-top:25px;font-size:0.85rem;color:var(--text-muted)">You'll be redirected to Google to sign in securely</p>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer" id="footer"></footer>
  <div id="toast-container" class="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
