<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - LuxeJewels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Luxe<span>Jewels</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?category=rings">Rings</a>
        <a href="products.html?category=necklaces">Necklaces</a>
        <a href="products.html?category=earrings">Earrings</a>
        <a href="products.html?category=bracelets">Bracelets</a>
      </div>
      <div class="nav-icons">
        <a href="account.html" class="nav-icon" id="account-link">&#9733;</a>
        <a href="cart.html" class="nav-icon">
          &#9829;
          <span class="cart-count">0</span>
        </a>
        <a href="#" class="nav-icon" id="auth-link">Logout</a>
        <button class="mobile-menu-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Account Section -->
    <section class="section">
      <div class="container">
        <!-- Order Confirmation -->
        <div id="order-confirmation" class="hidden" style="max-width: 600px; margin: 0 auto 40px;">
          <div style="background: var(--bg); padding: 40px; border-radius: var(--radius-lg); text-align: center; box-shadow: var(--shadow);">
            <div style="font-size: 4rem; margin-bottom: 15px;">&#9989;</div>
            <h2 style="margin-bottom: 10px;">Order Confirmed!</h2>
            <p style="color: var(--text-light); margin-bottom: 20px;">Thank you for your purchase. Your order has been received.</p>
            <p style="font-size: 0.9rem; color: var(--text-muted);">Order ID: <span id="order-id-display"></span></p>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 250px 1fr; gap: 30px;">
          <!-- Sidebar -->
          <div>
            <div style="background: var(--bg); padding: 25px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);">
              <div style="text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                <div style="width: 80px; height: 80px; background: var(--primary); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 10px;">
                  <span id="user-avatar">&#9734;</span>
                </div>
                <h4 id="user-name-display" style="font-size: 1.1rem;">User</h4>
                <p id="user-email-display" style="font-size: 0.85rem; color: var(--text-muted);">user@email.com</p>
              </div>
              
              <nav>
                <a href="#" class="nav-item" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; border-radius: var(--radius); margin-bottom: 5px; transition: var(--transition);" data-tab="profile" onclick="switchTab('profile', this)">
                  &#9733; Profile
                </a>
                <a href="#" class="nav-item" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; border-radius: var(--radius); margin-bottom: 5px; transition: var(--transition);" data-tab="orders" onclick="switchTab('orders', this)">
                  &#128230; Orders
                </a>
                <a href="#" class="nav-item" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; border-radius: var(--radius); margin-bottom: 5px; transition: var(--transition);" data-tab="wishlist" onclick="switchTab('wishlist', this)">
                  &#9829; Wishlist
                </a>
                <a href="admin.html" class="nav-item" id="admin-link" style="display: none; align-items: center; gap: 10px; padding: 12px 15px; border-radius: var(--radius); margin-bottom: 5px; transition: var(--transition);">
                  &#9881; Admin Panel
                </a>
              </nav>
            </div>
          </div>

          <!-- Content -->
          <div>
            <!-- Profile Tab -->
            <div class="tab-content active" id="tab-profile">
              <div style="background: var(--bg); padding: 30px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);">
                <h3 style="margin-bottom: 20px;">Profile Information</h3>
                <form id="profile-form">
                  <div class="grid grid-2">
                    <div class="form-group">
                      <label for="profile-name">Full Name</label>
                      <input type="text" id="profile-name" class="form-control">
                    </div>
                    <div class="form-group">
                      <label for="profile-email">Email Address</label>
                      <input type="email" id="profile-email" class="form-control">
                    </div>
                  </div>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
              </div>
            </div>

            <!-- Orders Tab -->
            <div class="tab-content" id="tab-orders">
              <div style="background: var(--bg); padding: 30px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);">
                <h3 style="margin-bottom: 20px;">Order History</h3>
                <div id="orders-list">
                  <!-- Orders loaded by JS -->
                </div>
              </div>
            </div>

            <!-- Wishlist Tab -->
            <div class="tab-content" id="tab-wishlist">
              <div style="background: var(--bg); padding: 30px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);">
                <h3 style="margin-bottom: 20px;">My Wishlist</h3>
                <div class="grid grid-3" id="wishlist-grid">
                  <!-- Wishlist loaded by JS -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/account.js"></script>
  <script src="js/wishlist.js"></script>

</body>
</html>
