<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - LuxeJewels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Luxe<span>Jewels</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?category=rings">Rings</a>
        <a href="products.html?category=necklaces">Necklaces</a>
        <a href="products.html?category=earrings">Earrings</a>
        <a href="products.html?category=bracelets">Bracelets</a>
      </div>
      <div class="nav-icons">
        <a href="account.html" class="nav-icon" id="account-link" style="display:none;">&#9733;</a>
        <a href="cart.html" class="nav-icon">
          &#9829;
          <span class="cart-count">0</span>
        </a>
        <a href="login.html" class="nav-icon" id="auth-link">Login</a>
        <button class="mobile-menu-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Breadcrumb -->
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <a href="cart.html">Cart</a>
        <span>/</span>
        <span class="current">Checkout</span>
      </div>
    </div>

    <!-- Checkout Section -->
    <section class="section" style="padding-top: 0;">
      <div class="container">
        <h1 style="font-size: 2rem; margin-bottom: 30px;">Checkout</h1>

        <div style="display: grid; grid-template-columns: 1fr 400px; gap: 30px;">
          <!-- Checkout Form -->
          <div>
            <form id="checkout-form">
              <!-- Shipping Information -->
              <div style="background: var(--bg); padding: 25px; border-radius: var(--radius-lg); margin-bottom: 20px;">
                <h3 style="font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                  <span style="width: 30px; height: 30px; background: var(--primary); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;">1</span>
                  Shipping Information
                </h3>
                
                <div class="grid grid-2">
                  <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" class="form-control" required>
                  </div>
                  <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" class="form-control" required>
                  </div>
                </div>
                
                <div class="form-group">
                  <label for="email">Email *</label>
                  <input type="email" id="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                  <label for="phone">Phone *</label>
                  <input type="tel" id="phone" class="form-control" required>
                </div>
                
                <div class="form-group">
                  <label for="address">Address *</label>
                  <input type="text" id="address" class="form-control" required>
                </div>
                
                <div class="grid grid-2">
                  <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" class="form-control" required>
                  </div>
                  <div class="form-group">
                    <label for="zip">ZIP Code *</label>
                    <input type="text" id="zip" class="form-control" required>
                  </div>
                </div>

                <div class="form-group">
                  <label for="country">Country *</label>
                  <select id="country" class="form-control" required>
                    <option value="">Select Country</option>
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                    <option value="UK">United Kingdom</option>
                    <option value="AU">Australia</option>
                  </select>
                </div>
              </div>

              <!-- Payment Information -->
              <div style="background: var(--bg); padding: 25px; border-radius: var(--radius-lg); margin-bottom: 20px;">
                <h3 style="font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                  <span style="width: 30px; height: 30px; background: var(--primary); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;">2</span>
                  Payment Information
                </h3>
                
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">
                  &#128274; Your payment information is secure and encrypted
                </p>
                
                <div class="form-group">
                  <label for="cardName">Name on Card *</label>
                  <input type="text" id="cardName" class="form-control" required>
                </div>
                
                <div class="form-group">
                  <label for="cardNumber">Card Number *</label>
                  <input type="text" id="cardNumber" class="form-control" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>
                
                <div class="grid grid-2">
                  <div class="form-group">
                    <label for="expiry">Expiry Date *</label>
                    <input type="text" id="expiry" class="form-control" placeholder="MM/YY" maxlength="5" required>
                  </div>
                  <div class="form-group">
                    <label for="cvv">CVV *</label>
                    <input type="text" id="cvv" class="form-control" placeholder="123" maxlength="4" required>
                  </div>
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg btn-block" style="width: 100%;">
                Place Order
              </button>
            </form>
          </div>

          <!-- Order Summary -->
          <div>
            <div style="background: var(--bg-alt); padding: 25px; border-radius: var(--radius-lg); position: sticky; top: 90px;">
              <h3 style="font-size: 1.1rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border);">Order Summary</h3>
              
              <div id="order-items" style="margin-bottom: 20px;">
                <!-- Loaded by JS -->
              </div>

              <div style="border-top: 1px solid var(--border); padding-top: 15px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                  <span style="color: var(--text-light);">Subtotal</span>
                  <span id="subtotal">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                  <span style="color: var(--text-light);">Shipping</span>
                  <span id="shipping">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid var(--border);">
                  <span style="font-weight: 600; font-size: 1.1rem;">Total</span>
                  <span style="font-weight: 700; font-size: 1.3rem; color: var(--secondary);" id="total">$0.00</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>

</body>
</html>
